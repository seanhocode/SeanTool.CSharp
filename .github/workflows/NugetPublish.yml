# secrets.GITHUB_TOKEN 在 push 和 release 時都需要相應權限，需確認 Repo 的 Settings > Actions > General > Workflow permissions 是 Read and write

name: NuGet Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    # ubuntu-latest 是 GitHub Actions 最輕量、啟動最快、執行速度也最快的 Runner
    # .NET 在 Linux 上編譯、Restore、Pack 的效能都比 Windows 佳
    # 並且所有 dotnet CLI 指令（restore/build/pack/push）在 Ubuntu 上完全可用
    # 因此非常適合用來做 NuGet 套件的自動化編譯與發布
    # 因加入Form專案，改用 Windows Runner
    runs-on: windows-latest

    # 設定全域預設 shell 為 bash
    defaults:
      run:
        shell: bash

    steps:
      # 檢出原始碼
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 要完整 diff

      # 讀取同資料夾下的設定檔
      - name: Load environment variables
        shell: bash
        run: |
          cat .github/workflows/public.env >> $GITHUB_ENV

      # 安裝 .NET SDK，用於 restore/build/publish
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
#           11.0.x

      # ---------------------------------------------------------
      # Step.1 取得本次 commit 的變動檔案
      # ---------------------------------------------------------
      - name: Get changed files
        id: diff
        run: |
          # 取得與 main 分支的差異，或是與前一個 commit 的差異
          git diff --name-only ${{ github.event.before }} ${{ github.event.after }} > diff.txt || git diff --name-only HEAD~1 HEAD > diff.txt
          echo "--- Changed files ---"
          cat diff.txt

      # ---------------------------------------------------------
      # Step.2 找出哪些 Tool 有變動（csproj / cs / 其他檔都算）
      # ---------------------------------------------------------
      - name: Detect Changed Projects
        id: detect
        # IFS=';' => string.split(';')，read -ra => 讀取成陣列(-r：代表 Raw。防止反斜線（\）被當作轉義字元處理)
        run: |
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"
          CHANGED=""
          
          for proj in "${PROJECTS[@]}"; do
            if grep -q "$proj" diff.txt; then
              echo "Detected project change: $proj"
              CHANGED="$CHANGED;$proj"
            fi
          done

          CHANGED=${CHANGED#;}
          echo "changed_projects=$CHANGED" >> $GITHUB_OUTPUT

      - name: Skip if no tool changed
        # steps.detect.outputs.changed_projects => 指向前一個步驟（id: detect）產生的輸出結果
        if: ${{ steps.detect.outputs.changed_projects == '' }}
        run: |
          echo "🚫 No Tool project changed. Skip."
          exit 0

      # ---------------------------------------------------------
      # Step.3 Restore
      # ---------------------------------------------------------
      - name: Restore Changed Projects
        run: |
          IFS=';' read -ra PROJECTS <<< "${{ steps.detect.outputs.changed_projects }}"
          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)
            echo "🔄 Restore: $FILE"
            dotnet restore "$FILE"
          done

      # ---------------------------------------------------------
      # Step.4 Build
      # ---------------------------------------------------------
      - name: Build Changed Projects
        run: |
          IFS=';' read -ra PROJECTS <<< "${{ steps.detect.outputs.changed_projects }}"
          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)
            echo "🏗 Build: $FILE"
            dotnet build "$FILE" -c Release --no-restore
          done

      # ---------------------------------------------------------
      # Step.5 Pack
      # ---------------------------------------------------------
      - name: Pack Changed Projects
        run: |
          mkdir -p ./nupkg
          IFS=';' read -ra PROJECTS <<< "${{ steps.detect.outputs.changed_projects }}"
          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)
            echo "📦 Pack: $FILE"
            dotnet pack "$FILE" -c Release -o ./nupkg --no-build
          done

      # ---------------------------------------------------------
      # Step.6 Publish to GitHub Packages
      # ---------------------------------------------------------
      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source \
            --name github \
            --username $GITHUB_ACTOR \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            "$GITHUB_NUGET_SOURCE"

# secrets.GITHUB_TOKEN 是 GitHub Actions 自動提供的授權
# 可以用來將 NuGet 套件發布到同一個 Repo的 GitHub Packages
# 但若要跨 Repo 推送或讀取私有套件，則必須使用 PAT
      - name: Publish to GitHub Packages
        run: |
          shopt -s nullglob
          for pkg in ./nupkg/*.nupkg; do
            echo "🚀 Publishing: $pkg"

            dotnet nuget push "$pkg" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --source github \
              --skip-duplicate
          done