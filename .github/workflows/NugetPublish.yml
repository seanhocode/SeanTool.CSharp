name: NuGet Publish

on:
  # 當有 Tag 推送到主分支時觸發 (例如: git tag v1.0.0; git push --tags)
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  # 要發布到 NuGet 的專案名稱（不要附 .csproj）
  # 用分號區隔，可設定多個
  INCLUDE_PROJECTS: "FileTool;JsonTool;ProcessTool;XMLTool;ZipTool"

  # GitHub Packages Feed URL
  # 固定格式：https://nuget.pkg.github.com/GitHub使用者名稱/index.json
  GITHUB_NUGET_SOURCE: "https://nuget.pkg.github.com/seanhocode/index.json"

jobs:
  publish:
    # ubuntu-latest 是 GitHub Actions 最輕量、啟動最快、執行速度也最快的 Runner
    # .NET 在 Linux 上編譯、Restore、Pack 的效能都比 Windows 佳
    # 並且所有 dotnet CLI 指令（restore/build/pack/push）在 Ubuntu 上完全可用
    # 因此非常適合用來做 NuGet 套件的自動化編譯與發布
    runs-on: ubuntu-latest

    steps:
      # 檢出原始碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 安裝 .NET SDK，用於 restore/build/publish
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # 從Tag取得版本號 Tag格式：v[X].[X].[X]
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"   # 移除前面的 v
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ----------------------------------------------
      # Restore
      # ----------------------------------------------
      - name: Restore Included Projects
        shell: bash
        run: |
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"

          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)

            if [[ -f "$FILE" ]]; then
              echo "🔄 Restore: $FILE"
              dotnet restore "$FILE" -p:EnableWindowsTargeting=true
            else
              echo "⚠️ 找不到專案：$proj"
            fi
          done

      # ----------------------------------------------
      # Build
      # ----------------------------------------------
      - name: Build Included Projects
        shell: bash
        run: |
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"

          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)

            if [[ -f "$FILE" ]]; then
              echo "🏗 Build: $FILE"
              dotnet build "$FILE" -c Release --no-restore -p:EnableWindowsTargeting=true
            fi
          done

      # ----------------------------------------------
      # Pack
      # ----------------------------------------------
      - name: Pack Included Projects
        shell: bash
        run: |
          mkdir -p ./nupkg
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"

          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)

            if [[ -f "$FILE" ]]; then
              echo "📦 Pack: $FILE"

              dotnet pack "$FILE" -c Release -o ./nupkg \
                --no-build \
                /p:PackageVersion=${{ steps.get_version.outputs.version }}
            fi
          done

      # -------------------------------------------------
      # Publish to GitHub Packages
      # -------------------------------------------------
      - name: Publish to GitHub Packages
        shell: bash
        run: |
          shopt -s nullglob
          for pkg in ./nupkg/*.nupkg; do
            echo "🚀 Publishing: $pkg"

            dotnet nuget push "$pkg" \
              # secrets.GITHUB_TOKEN 是 GitHub Actions 自動提供的授權
              # 可以用來將 NuGet 套件發布到同一個 Repo的 GitHub Packages
              # 但若要跨 Repo 推送或讀取私有套件，則必須使用 PAT
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --source "$GITHUB_NUGET_SOURCE" \
              --skip-duplicate
          done