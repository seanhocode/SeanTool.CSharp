name: NuGet Publish

on:
  push:
    branches:
      - main 

env:
  # ❗ 需要發布 NuGet 套件的專案名稱（不用附路徑、不用附副檔名）
  # 格式：以分號分隔
  INCLUDE_PROJECTS: "FileTool;JsonTool;ProcessTool;XMLTool;ZipTool"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Restore (only included projects)
      - name: Restore Included Projects
        run: |
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"
          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj")
            if [ -f "$FILE" ]; then
              echo "Restoring: $FILE"
              dotnet restore "$FILE" -p:EnableWindowsTargeting=true
            else
              echo "Project not found: $proj"
            fi
          done

      # Build (only included projects)
      - name: Build Included Projects
        run: |
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"
          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj")
            if [ -f "$FILE" ]; then
              echo "Building: $FILE"
              dotnet build "$FILE" -c Release --no-restore -p:EnableWindowsTargeting=true
            fi
          done

      # Pack (only included projects)
      - name: Pack Included Projects
        run: |
          mkdir -p ./nupkg
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"
          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj")
            if [ -f "$FILE" ]; then
              echo "Packing: $FILE"
              dotnet pack "$FILE" -c Release -o ./nupkg --no-build -p:EnableWindowsTargeting=true
            fi
          done

      # Publish packages
      - name: Publish to NuGet
        run: |
          shopt -s nullglob
          for pkg in ./nupkg/*.nupkg; do
            echo "Publishing $pkg"
            dotnet nuget push "$pkg" \
              -k ${{ secrets.NUGET_API_KEY }} \
              -s https://api.nuget.org/v3/index.json
          done