name: NuGet Publish

on:
  push:
    branches:
      - main 

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 自動 Restore 所有非 Test 的 Tool 專案（含 Windows Targeting）
      - name: Restore Tool Projects (Exclude Tests)
        run: |
          for proj in $(find . -name "*Tool.csproj" ! -name "*Test*"); do
            echo "Restoring $proj"
            dotnet restore "$proj" -p:EnableWindowsTargeting=true
          done

      # 自動 Build 所有非 Test 的 Tool 專案
      - name: Build Tool Projects
        run: |
          for proj in $(find . -name "*Tool.csproj" ! -name "*Test*"); do
            echo "Building $proj"
            dotnet build "$proj" -c Release --no-restore -p:EnableWindowsTargeting=true
          done

      # 自動 Pack
      - name: Pack Tool Projects
        run: |
          mkdir -p ./nupkg
          for proj in $(find . -name "*Tool.csproj" ! -name "*Test*"); do
            echo "Packing $proj"
            dotnet pack "$proj" -c Release -o ./nupkg --no-build -p:EnableWindowsTargeting=true
          done

      # Publish 所有 nupkg
      - name: Publish to NuGet
        run: |
          for pkg in ./nupkg/*.nupkg; do
            echo "Publishing $pkg"
            dotnet nuget push "$pkg" \
              -k ${{ secrets.NUGET_API_KEY }} \
              -s https://api.nuget.org/v3/index.json
          done