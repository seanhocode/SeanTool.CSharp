name: Publish NuGet Package to GitHub Packages

on:
  # === 修改此處，設定 push 觸發條件 ===
  push:
    branches:
      # 當推送到 main 分支時觸發
      - main 
      # 您可以根據需要加入其他分支，例如: - dev
  # ==================================

jobs:
  publish:
    # 設置環境
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 
        
    # 1. 建置核心專案
    # 使用 --filter 篩選出所有不包含 'Test' 的專案進行建置
    # /p:EnableWindowsTargeting=true 解決 NETSDK1100 錯誤
    - name: Build core projects
      run: |
        dotnet build Tool.CSharp.Net8.sln \
          --configuration Release \
          --filter ":!*Test*" \
          /p:EnableWindowsTargeting=true
          
    # 2. 生成 .nupkg 檔案
    # 再次使用 --filter，只打包需要發布的核心專案 (使用 --no-build 因為上一步已建置)
    - name: Pack NuGet package
      run: |
        dotnet pack Tool.CSharp.Net8.sln \
          --configuration Release \
          --output nuget_packages \
          --no-build \
          --filter ":!*Test*"
          
    # 3. 發布套件到 GitHub Packages
    - name: Push package to GitHub Packages
      run: |
        dotnet nuget push nuget_packages/*.nupkg \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --skip-duplicate