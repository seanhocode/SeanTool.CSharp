name: NuGet Publish

on:
  push:
    branches:
      - main 

env:
  # 要發布到 NuGet 的專案名稱（不要附 .csproj）
  # 用分號區隔，可設定多個
  INCLUDE_PROJECTS: "FileTool;JsonTool;ProcessTool;XMLTool;ZipTool"

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ----------------------------------------------
      # Restore
      # ----------------------------------------------
      - name: Restore Included Projects
        shell: bash
        run: |
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"

          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)

            if [[ -f "$FILE" ]]; then
              echo "🔄 Restore: $FILE"
              dotnet restore "$FILE" -p:EnableWindowsTargeting=true
            else
              echo "⚠️ 找不到專案：$proj"
            fi
          done

      # ----------------------------------------------
      # Build
      # ----------------------------------------------
      - name: Build Included Projects
        shell: bash
        run: |
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"

          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)

            if [[ -f "$FILE" ]]; then
              echo "🏗 Build: $FILE"
              dotnet build "$FILE" -c Release --no-restore -p:EnableWindowsTargeting=true
            fi
          done

      # ----------------------------------------------
      # Pack
      # ----------------------------------------------
      - name: Pack Included Projects
        shell: bash
        run: |
          mkdir -p ./nupkg
          IFS=';' read -ra PROJECTS <<< "$INCLUDE_PROJECTS"

          for proj in "${PROJECTS[@]}"; do
            FILE=$(find . -name "$proj.csproj" | head -n 1)

            if [[ -f "$FILE" ]]; then
              echo "📦 Pack: $FILE"
              dotnet pack "$FILE" -c Release -o ./nupkg --no-build -p:EnableWindowsTargeting=true
            fi
          done

      # ----------------------------------------------
      # Publish to NuGet
      # ----------------------------------------------
      - name: Publish to NuGet
        shell: bash
        run: |
          shopt -s nullglob

          for pkg in ./nupkg/*.nupkg; do
            echo "🚀 Publishing: $pkg"
            dotnet nuget push "$pkg" \
              -k ${{ secrets.NUGET_API_KEY }} \
              -s https://api.nuget.org/v3/index.json
          done

          echo "🎉 All packages published successfully!"