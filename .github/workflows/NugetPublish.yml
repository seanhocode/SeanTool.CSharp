name: NuGet Publish

on:
  push:
    branches:
      - main 

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Solution
        run: dotnet restore Tool.CSharp.Net8.sln

      # 自動尋找所有非 Test 的 *Tool.csproj 並建置
      - name: Build All Tool Projects (Exclude Tests)
        run: |
          echo "Building Tool projects..."
          for proj in $(find . -name "*Tool.csproj" ! -name "*Test*"); do
            echo "Building $proj"
            dotnet build "$proj" -c Release --no-restore
          done

      # 自動 Pack
      - name: Pack All Tool Projects
        run: |
          mkdir -p ./nupkg
          echo "Packing Tool projects..."
          for proj in $(find . -name "*Tool.csproj" ! -name "*Test*"); do
            echo "Packing $proj"
            dotnet pack "$proj" -c Release -o ./nupkg --no-build
          done

      # Push 所有 .nupkg 到 NuGet
      - name: Publish to NuGet
        run: |
          for pkg in ./nupkg/*.nupkg; do
            echo "Publishing $pkg"
            dotnet nuget push "$pkg" \
              -k ${{ secrets.NUGET_API_KEY }} \
              -s https://api.nuget.org/v3/index.json
          done